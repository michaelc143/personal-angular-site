<div class="experience-page-div" [ngClass]="{'dark-mode': isDarkMode}">

  <!-- Experience Section -->
  <h1 class="section-heading">Experience</h1>

  <div class="timeline">
    <div class="job-card" *ngFor="let job of jobs">
      <div class="job-header">
        <div class="job-title-group">
          <span class="job-role">{{ job.role }}</span>
          <span class="job-company">{{ job.company }}</span>
        </div>
        <span class="job-date">{{ job.dateRange }}</span>
      </div>
      <ul class="job-topics">
        <li *ngFor="let topic of job.topics">{{ topic }}</li>
      </ul>
    </div>
  </div>

  <mat-divider [ngClass]="{ 'white-divider': isDarkMode }"></mat-divider>

  <!-- Skills Section -->
  <h1 class="section-heading">Skills</h1>

  <div class="skill-section" *ngFor="let group of skillGroups">
    <h2 class="skill-group-title">{{ group.title }}</h2>
    <div class="chips-list">
      <mat-chip *ngFor="let item of group.items">
        <img *ngIf="item.logo" matChipAvatar [src]="item.logo" [alt]="item.label" height="18">
        {{ item.label }}
      </mat-chip>
    </div>
  </div>

</div>
