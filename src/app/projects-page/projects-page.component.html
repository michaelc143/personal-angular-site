<div class="projects-page" [ngClass]="{'dark-mode': isDarkMode}">

  <h1 class="projects-title">Projects</h1>

  <div class="projects-grid">
    <mat-card
      *ngFor="let project of projects"
      [ngClass]="{'dark-mode-card': isDarkMode}"
      class="project-card">

      <img mat-card-image [src]="project.image" [alt]="project.title">

      <mat-card-header>
        <mat-card-title>{{ project.title }}</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <p class="project-description">{{ project.description }}</p>
        <div class="project-tags">
          <span class="tag" *ngFor="let tag of project.tags">{{ tag }}</span>
        </div>
      </mat-card-content>

      <mat-card-actions>
        <div [class]="getLinkClass(project.title)">
          <a
            *ngFor="let link of project.links"
            [href]="link.url"
            target="_blank"
            rel="noopener"
            mat-stroked-button>
            {{ link.label }}
          </a>
        </div>
      </mat-card-actions>

    </mat-card>
  </div>

</div>
