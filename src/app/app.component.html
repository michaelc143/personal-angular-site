<!-- Toolbar -->
<div class="toolbar" role="banner">
  <img width="40" alt="Michael Corbishley Logo" src="https://raw.githubusercontent.com/michaelc143/personal-angular-site/main/src/logo.png" />
  <a routerLink="" class="toolbar-name" matRipple [matRippleCentered]="true">
    <span class="my-name">Michael Corbishley</span>
  </a>
  <app-app-dark-mode-toggle></app-app-dark-mode-toggle>
    <div class="spacer"></div>
    <a href="https://www.linkedin.com/in/michael-corbishley/" target="_blank" matRipple [matRippleCentered]="true" matTooltip="Link to my Linkedin!">
      <img class="linkedin-logo" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linkedin/linkedin-original.svg">
    </a>
    <div class="github-link">
      <a target="_blank" href="https://github.com/michaelc143" matRipple [matRippleCentered]="true" matTooltip="Link to my Github!">
        <img width="35" alt="Octicons-mark-github" src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg">
      </a>    
    </div>
    <button mat-button [matMenuTriggerFor]="menu" class="menu-btn">Pages</button>
    <mat-menu #menu="matMenu">
      <a aria-label="experience" class="experience-div" routerLink="experience" matRipple [matRippleCentered]="true" matTooltip="My experience in software!">
        <span mat-menu-item class="exp-and-skills">Experience & Skills
          <mat-icon>work</mat-icon>
        </span>
      </a>
      <a aria-label="projects" class="skills-div" routerLink="projects" matRipple [matRippleCentered]="true" matTooltip="Some of my previous projects!">
        <span mat-menu-item class="projects-link">Projects
          <mat-icon>gesture</mat-icon>
        </span>
      </a>
      <a aria-label="resume" target="_blank" href="https://drive.google.com/file/d/1x9mEZRvsrM68mpf2fHhRHipHIQVpsRDm/view?usp=sharing" matRipple [matRippleCentered]="true" matTooltip="My resume!">
        <span mat-menu-item class="contact-link">Resume
        <mat-icon>business</mat-icon>
        </span>
      </a>
      <a href="mailto:mcorbishley@wisc.edu" matRipple [matRippleCentered]="true" matTooltip="Click here to email me!">
        <span mat-menu-item class="contact-link">Contact me here!
        <mat-icon>email</mat-icon>
        </span>
      </a>
    </mat-menu>
</div>
<main class="page-shell">
  <router-outlet></router-outlet>
</main>
<footer>
  <button class="homeBtn" routerLink="">
    <div class="homebuttondiv">
      Home
      <mat-icon>home</mat-icon>
    </div>
  </button>

  <div class="wave-container">
    <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
      <defs>
        <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
      </defs>
      <g class="parallax">
        <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(44, 62, 80, 0.7)" />
        <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(44, 62, 80, 0.5)" />
        <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(44, 62, 80, 0.3)" />
        <use xlink:href="#gentle-wave" x="48" y="7" fill="#2c3e50" />
      </g>
    </svg>
  </div>
</footer>
